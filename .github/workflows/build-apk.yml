name: Build Android APK

# Builds an installable Android APK in the cloud.
# Trigger: every push to main/master, or manually via the "Run workflow" button.
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Supabase credentials are injected from repo secrets so they are NOT
      # committed to git. Add them under: Settings > Secrets and variables > Actions
      - name: Create .env from secrets
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      - name: Build web assets (Vite)
        run: npm run build

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk hdsb-eform.apk

      # Download the finished APK from this workflow run's "Artifacts" section.
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hdsb-eform-apk
          path: hdsb-eform.apk
          if-no-files-found: error

      # When you push a git tag like v1.0.0, the APK is also attached to a
      # GitHub Release for a permanent, easy-to-share download link.
      - name: Attach APK to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: hdsb-eform.apk
